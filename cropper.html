<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>16:9 PNG Cropper + White Remover</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex; flex-direction: column; align-items: center;
            padding: 40px; background-color: #f4f4f9; color: #333;
        }
        .container {
            max-width: 900px; width: 100%; text-align: center;
            background: white; padding: 30px; border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        .controls {
            margin-bottom: 20px; display: flex; gap: 10px;
            justify-content: center; flex-wrap: wrap;
        }
        canvas {
            max-width: 100%; height: auto; border: 2px dashed #ccc;
            margin-top: 20px;
            background-image: 
                linear-gradient(45deg, #eee 25%, transparent 25%), 
                linear-gradient(-45deg, #eee 25%, transparent 25%), 
                linear-gradient(45deg, transparent 75%, #eee 75%), 
                linear-gradient(-45deg, transparent 75%, #eee 75%);
            background-size: 20px 20px; background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
        }
        button {
            padding: 10px 18px; font-size: 14px; font-weight: 600;
            cursor: pointer; border: none; border-radius: 6px;
            background-color: #007bff; color: white; transition: 0.2s;
        }
        button:hover { background-color: #0056b3; }
        button:disabled { background-color: #ccc; cursor: not-allowed; }
        .secondary { background-color: #28a745; }
        .secondary:hover { background-color: #218838; }
        .danger { background-color: #dc3545; }
        .danger:hover { background-color: #bd2130; }
        #status { margin-top: 10px; font-size: 14px; color: #666; }
    </style>
</head>
<body>

<div class="container">
    <h2>16:9 Content Cropper</h2>
    <p>Upload an image. Use "Remove White" if it has a solid background, then save.</p>
    
    <div class="controls">
        <input type="file" id="upload" accept="image/*" hidden>
        <button onclick="document.getElementById('upload').click()">Upload Image</button>
        <button id="whiteBtn" class="danger" disabled>Remove White</button>
        <button id="downloadBtn" class="secondary" disabled>Save PNG</button>
        <button id="copyBtn" class="secondary" disabled>Copy to Clipboard</button>
    </div>

    <div id="status">Ready</div>
    <canvas id="canvas"></canvas>
</div>

<script>
    const upload = document.getElementById('upload');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d', { alpha: true });
    const downloadBtn = document.getElementById('downloadBtn');
    const copyBtn = document.getElementById('copyBtn');
    const whiteBtn = document.getElementById('whiteBtn');
    const status = document.getElementById('status');

    let originalImg = null;
    let processedBlob = null;

    upload.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = (event) => {
            originalImg = new Image();
            originalImg.onload = () => processImage(false);
            originalImg.src = event.target.result;
        };
        reader.readAsDataURL(file);
    });

    whiteBtn.addEventListener('click', () => processImage(true));

    function processImage(shouldRemoveWhite) {
        if (!originalImg) return;

        // 1. Setup processing canvas
        const tempCanvas = document.createElement('canvas');
        const tempCtx = tempCanvas.getContext('2d');
        tempCanvas.width = originalImg.width;
        tempCanvas.height = originalImg.height;
        tempCtx.drawImage(originalImg, 0, 0);

        const imageData = tempCtx.getImageData(0, 0, tempCanvas.width, tempCanvas.height);
        const data = imageData.data;

        // 2. Optional White Removal Logic
        if (shouldRemoveWhite) {
            const threshold = 240; // Anything brighter than this is "white"
            for (let i = 0; i < data.length; i += 4) {
                const r = data[i], g = data[i+1], b = data[i+2];
                if (r > threshold && g > threshold && b > threshold) {
                    data[i + 3] = 0; // Set alpha to 0
                }
            }
            tempCtx.putImageData(imageData, 0, 0);
        }

        // 3. Find Content Bounding Box
        let minX = tempCanvas.width, minY = tempCanvas.height, maxX = 0, maxY = 0;
        let foundContent = false;

        for (let y = 0; y < tempCanvas.height; y++) {
            for (let x = 0; x < tempCanvas.width; x++) {
                const alpha = data[(y * tempCanvas.width + x) * 4 + 3];
                if (alpha > 0) {
                    if (x < minX) minX = x; if (x > maxX) maxX = x;
                    if (y < minY) minY = y; if (y > maxY) maxY = y;
                    foundContent = true;
                }
            }
        }

        if (!foundContent) {
            status.innerText = "Error: Resulting image is fully transparent.";
            return;
        }

        const contentW = (maxX - minX) + 1;
        const contentH = (maxY - minY) + 1;
        
        // 4. Calculate 16:9 Ratio
        const targetRatio = 16 / 9;
        let finalW, finalH;

        if (contentW / contentH > targetRatio) {
            finalW = contentW;
            finalH = contentW / targetRatio;
        } else {
            finalH = contentH;
            finalW = contentH * targetRatio;
        }

        // 5. Render Final Output
        canvas.width = finalW;
        canvas.height = finalH;
        ctx.clearRect(0, 0, finalW, finalH);
        
        const offsetX = (finalW - contentW) / 2;
        const offsetY = (finalH - contentH) / 2;

        ctx.drawImage(
            tempCanvas, 
            minX, minY, contentW, contentH, 
            offsetX, offsetY, contentW, contentH
        );

        // 6. Update UI/Export
        canvas.toBlob((blob) => {
            processedBlob = blob;
            downloadBtn.disabled = false;
            copyBtn.disabled = false;
            whiteBtn.disabled = false;
            status.innerText = `Size: ${Math.round(finalW)}x${Math.round(finalH)} (16:9)`;
        }, 'image/png');
    }

    downloadBtn.addEventListener('click', () => {
        const url = URL.createObjectURL(processedBlob);
        const link = document.createElement('a');
        link.href = url;
        link.download = 'transparent_16x9.png';
        link.click();
        URL.revokeObjectURL(url);
    });

    copyBtn.addEventListener('click', async () => {
        try {
            const data = [new ClipboardItem({ 'image/png': processedBlob })];
            await navigator.clipboard.write(data);
            alert('Copied to clipboard!');
        } catch (err) {
            alert('Clipboard copy failed. Try "Save PNG" instead.');
        }
    });
</script>

</body>
</html>
